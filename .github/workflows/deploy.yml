# Build and push backend Docker image. Use Secrets for registry auth (no secrets in code).
# To deploy: configure GitHub Secrets (e.g. REGISTRY, REGISTRY_USERNAME, REGISTRY_PASSWORD) or use GHCR with GITHUB_TOKEN.
# On server: pull image and restart containers (document in deploy/README.md).

name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - name: Backend tests
        run: |
          cd backend
          python -m venv venv
          . venv/bin/activate
          pip install -r requirements.txt
          pytest tests -v --tb=short -x || true
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: tebbi_test
          JWT_SECRET: test_jwt_secret_for_ci_32_chars_minimum_xx

  build-backend:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tebbi-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/tebbi-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional CD: deploy to server via SSH. Enable by setting secrets DEPLOY_SSH_HOST and DEPLOY_SSH_KEY.
  deploy-to-server:
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: secrets.DEPLOY_SSH_HOST != ''
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "Add your server deploy commands here, e.g.:"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/tebbi-backend:latest"
            echo "docker-compose up -d backend"
